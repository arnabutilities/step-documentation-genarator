<svg xmlns="http://www.w3.org/2000/svg" width="960" height="760" viewBox="0 0 960 760" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowLoop" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b45309"/>
    </marker>
    <style>
      .title  { font-size: 26px; font-weight: 700; fill: #0f172a; }
      .sub    { font-size: 14px; fill: #64748b; }
      .box    { rx: 12; ry: 12; stroke-width: 1.5; }
      .lbl    { font-size: 15px; font-weight: 600; fill: #0f172a; }
      .file   { font-size: 12px; fill: #64748b; font-family: Consolas, monospace; }
      .note   { font-size: 12.5px; fill: #334155; }
      .edge   { stroke: #475569; stroke-width: 2; fill: none; }
      .loop   { stroke: #b45309; stroke-width: 2; stroke-dasharray: 6 4; fill: none; }
      .badge  { font-size: 12px; font-weight: 600; }
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="760" fill="#f8fafc"/>

  <text x="40" y="48" class="title">Recursive Markdown Agent  Architecture</text>
  <text x="41" y="72" class="sub">topic &#8594; detailed Markdown &#8594; extract steps &#8594; recurse (generate a Markdown tree)</text>

  <!-- User / CLI -->
  <rect x="380" y="100" width="200" height="64" class="box" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="480" y="128" text-anchor="middle" class="lbl">User / CLI</text>
  <text x="480" y="148" text-anchor="middle" class="file">python -m agent.main "topic"</text>

  <!-- main.py -->
  <rect x="360" y="200" width="240" height="76" class="box" fill="#ffffff" stroke="#94a3b8"/>
  <text x="480" y="228" text-anchor="middle" class="lbl">CLI Entry Point</text>
  <text x="480" y="247" text-anchor="middle" class="file">agent/main.py</text>
  <text x="480" y="265" text-anchor="middle" class="note">argparse, config + state, error handling</text>

  <!-- Recursion engine big container -->
  <rect x="120" y="320" width="720" height="300" rx="16" ry="16" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="140" y="346" class="lbl" fill="#b45309">Recursion Engine &#8212; expand()</text>
  <text x="140" y="365" class="file" fill="#b45309">agent/recursion.py</text>

  <!-- Safeguards box -->
  <rect x="600" y="334" width="226" height="74" rx="10" ry="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.3"/>
  <text x="713" y="356" text-anchor="middle" class="badge" fill="#b91c1c">Safeguards (guarantee termination)</text>
  <text x="713" y="376" text-anchor="middle" class="note">max_depth &#183; max_nodes</text>
  <text x="713" y="393" text-anchor="middle" class="note">seen{} dedup set</text>

  <!-- Step 1: Generate -->
  <rect x="150" y="420" width="200" height="86" class="box" fill="#ffffff" stroke="#94a3b8"/>
  <text x="250" y="446" text-anchor="middle" class="lbl">1. Generate</text>
  <text x="250" y="465" text-anchor="middle" class="file">agent/generator.py</text>
  <text x="250" y="484" text-anchor="middle" class="note">prompt &#8594; Markdown</text>
  <text x="250" y="500" text-anchor="middle" class="note">with "## Steps" section</text>

  <!-- Step 2: Save -->
  <rect x="390" y="420" width="180" height="86" class="box" fill="#ffffff" stroke="#94a3b8"/>
  <text x="480" y="446" text-anchor="middle" class="lbl">2. Save file</text>
  <text x="480" y="465" text-anchor="middle" class="file">&lt;slug&gt;.md</text>
  <text x="480" y="484" text-anchor="middle" class="note">write document +</text>
  <text x="480" y="500" text-anchor="middle" class="note">child links</text>

  <!-- Step 3: Extract -->
  <rect x="610" y="420" width="200" height="86" class="box" fill="#ffffff" stroke="#94a3b8"/>
  <text x="710" y="446" text-anchor="middle" class="lbl">3. Extract steps</text>
  <text x="710" y="465" text-anchor="middle" class="file">agent/extractor.py</text>
  <text x="710" y="484" text-anchor="middle" class="note">regex parses the</text>
  <text x="710" y="500" text-anchor="middle" class="note">"## Steps" list</text>

  <!-- Step 4: Recurse -->
  <rect x="300" y="540" width="360" height="60" class="box" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="480" y="566" text-anchor="middle" class="lbl" fill="#b45309">4. For each step &#8594; expand(step, depth + 1)</text>
  <text x="480" y="585" text-anchor="middle" class="note">recurse until no steps remain or a limit is hit</text>

  <!-- LLM client + API -->
  <rect x="150" y="660" width="200" height="64" class="box" fill="#ecfeff" stroke="#06b6d4"/>
  <text x="250" y="686" text-anchor="middle" class="lbl">LLM Client</text>
  <text x="250" y="706" text-anchor="middle" class="file">agent/llm.py (OpenAI)</text>

  <!-- Output tree -->
  <rect x="610" y="650" width="220" height="84" class="box" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="720" y="675" text-anchor="middle" class="lbl">Output Tree</text>
  <text x="720" y="694" text-anchor="middle" class="file">output/</text>
  <text x="720" y="711" text-anchor="middle" class="note">linked Markdown files</text>
  <text x="720" y="727" text-anchor="middle" class="note">mirroring the recursion</text>

  <!-- Edges -->
  <path class="edge" d="M480,164 L480,200" marker-end="url(#arrow)"/>
  <path class="edge" d="M480,276 L480,420" marker-end="url(#arrow)"/>

  <!-- generate -> save -> extract -->
  <path class="edge" d="M350,463 L390,463" marker-end="url(#arrow)"/>
  <path class="edge" d="M570,463 L610,463" marker-end="url(#arrow)"/>

  <!-- extract -> recurse -->
  <path class="edge" d="M710,506 L710,524 L600,524 L600,558 L600,560" />
  <path class="edge" d="M700,524 L660,560" marker-end="url(#arrow)"/>

  <!-- recurse loop back to generate (top) -->
  <path class="loop" d="M300,570 L250,570 L250,506" marker-end="url(#arrowLoop)"/>
  <text x="150" y="556" class="badge" fill="#b45309">recursion loop</text>

  <!-- generate -> llm -->
  <path class="edge" d="M250,506 L250,660" marker-end="url(#arrow)"/>
  <text x="262" y="600" class="note" fill="#0e7490">API call</text>

  <!-- save -> output -->
  <path class="edge" d="M520,506 L520,640 L660,640 L660,650" marker-end="url(#arrow)"/>
</svg>
